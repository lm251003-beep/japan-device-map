<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>都道府県別端末利用率</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <header>
        <h1>都道府県別端末利用率</h1>
        <p>総務省「通信利用動向調査」をもとにした可視化サイト</p>
    </header>

    <main>

        <section class="map-area">

            <h2>日本地図</h2>

            
            <div id="japan-map">
      <img src="japan-map.svg" alt="日本地図">
    </div>

        </section>

        <section class="info-area">

            <h2>都道府県データ</h2>

            <div class="info-card">

                <h3 id="pref-name">神奈川県</h3>

                <p>
                    利用項目：
                    <span id="device-name">
                        スマートフォン
                    </span>
                </p>

                <p>
                    利用率：
                    <span id="rate">
                        82.4%
                    </span>
                </p>

            </div>

        </section>

    </main>

    <section class="button-area">

        <button id="pcBtn">
            パソコン
        </button>

        <button id="phoneBtn">
            携帯電話
        </button>

        <button id="smartphoneBtn">
            スマートフォン
        </button>

        <button id="tabletBtn">
            タブレット
        </button>

    </section>

    <section class="legend">

        <h3>凡例</h3>

        <div class="legend-item">
            <div class="color high"></div>
            <span>高い</span>
        </div>

        <div class="legend-item">
            <div class="color middle"></div>
            <span>普通</span>
        </div>

        <div class="legend-item">
            <div class="color low"></div>
            <span>低い</span>
        </div>

    </section>

</body>
</html>
